name: Node Pipeline

on: 
  workflow_dispatch:

jobs:
  Build:
    runs-on: [self-hosted, Linux]

    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create env file
        run: |
          echo "PORT=3000" >> .env.development
          echo "APP=GHA APP" >> .env.development

      - name: Run Application
        run: node server.js &
